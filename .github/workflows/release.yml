name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Build in Docker
        run: |
          docker build -t rwal-builder -f deploy/Dockerfile .
          docker run --rm -v $(pwd)/build:/app/build rwal-builder

      - name: Package with CPack
        run: |
          docker run --rm -v $(pwd):/app rwal-builder bash -c "cd /app/build && cpack -G 'DEB;RPM;TGZ'"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            build/rwal-*.deb
            build/rwal-*.rpm
            build/rwal-*.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Setup dependencies
        run: python setup.py

      - name: Build
        run: python build.py

      - name: Package ZIP
        run: |
          cd build/windows-release
          7z a rwal-windows.zip rwal-cli.exe
        shell: bash

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: |
            build/windows-release/rwal-windows-cli.zip
            build/windows-release/rwal-cli.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release and Upload All Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/linux-packages/*
            artifacts/windows-package/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

