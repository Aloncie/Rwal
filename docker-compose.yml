services:
  rwal:
    build:
      context: .
      dockerfile: Dockerfile.base 
      network: host
    image: aloncie/rwal:latest
    environment:
      - DISPLAY=${DISPLAY}
      - DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/${UID:-1000}/bus
      - HOME=/home/developer
    volumes:
      - .:/app
      - ~/.config/Aloncie:/home/developer/.config/Aloncie
      - ~/.cache/Aloncie:/home/developer/.cache/Aloncie
      - ~/Pictures/Rwal:/home/developer/Pictures/Rwal
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      - /run/user/${UID:-1000}/bus:/run/user/${UID:-1000}/bus:ro
    working_dir: /app
    entrypoint: ./docker-entrypoint-dev.sh
    command: ./rwal
    stdin_open: true
    tty: true
