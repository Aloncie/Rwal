repos:
  - repo: local
    hooks:
      - id: local-clang-format
        name: Clang Format (Local)
        entry: clang-format -i
        language: system
        types_or: [c++, c, header]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
